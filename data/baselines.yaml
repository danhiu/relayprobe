  claude-opus-4-7:
    aliases: []
    provider: anthropic
    expected_identity_keywords: ["claude", "anthropic"]
    forbidden_identity_keywords: ["openai", "gpt", "google", "gemini", "glm", "qwen", "deepseek", "kiro", "cursor", "cline", "continue.dev", "aider", "zed"]
    expected_tokens_per_second: 35
    expected_latency_p50_ms: 1500
    tokenizer: anthropic
    supports:
      tool_use: true
      web_search: true
      sub_agent: true
      streaming: true
    strengths_zh: ["代码生成", "长上下文", "复杂推理"]
    weaknesses_zh: ["数学推理偏弱"]
