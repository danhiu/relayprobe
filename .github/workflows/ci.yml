name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check .
      - name: Run tests
        run: pytest -v --tb=short

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t relayprobe:ci .
      - name: Smoke test container
        run: |
          docker run -d --name probe -p 127.0.0.1:8800:8800 relayprobe:ci
          for i in 1 2 3 4 5; do
            sleep 3
            if curl -fsS http://127.0.0.1:8800/healthz; then
              echo "healthcheck passed"
              exit 0
            fi
          done
          echo "healthcheck failed"
          docker logs probe
          exit 1
