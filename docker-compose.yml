name: ai-relay-detector

services:
  detector:
    build: .
    image: ai-relay-detector:0.1.0
    container_name: ai-relay-detector
    restart: unless-stopped
    ports:
      - "127.0.0.1:8800:8800"
    environment:
      DETECTOR_LOG_LEVEL: INFO
      DETECTOR_DEFAULT_BUDGET_USD: "0.5"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
